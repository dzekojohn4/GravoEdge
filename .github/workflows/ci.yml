name: CI Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'gravoedge/web_app/**'
      - 'gravoedge/frontend/**'
      - 'devops/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gravoedge/web_app/**'
      - 'gravoedge/frontend/**'
      - 'devops/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gravoedge
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start services and initialize database
        run: |
          docker compose -f devops/docker-compose.gravoedge.back.yaml up -d --build
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 2))s"
              break
            fi
            sleep 2
          done
          # Run only existing migrations (never autogenerate in CI)
          docker compose -f devops/docker-compose.gravoedge.back.yaml exec -T backend poetry run alembic -c web_app/alembic.ini upgrade head

      - name: Run tests
        run: |
          docker compose -f devops/docker-compose.gravoedge.back.yaml exec -T backend poetry run pytest web_app/tests -v

      - name: Run tests with coverage
        run: |
          docker compose -f devops/docker-compose.gravoedge.back.yaml exec -T backend poetry run pytest web_app/tests --cov=web_app --cov-report=term-missing --cov-fail-under=60

      - name: Tear down
        if: always()
        run: |
          docker compose -f devops/docker-compose.gravoedge.back.yaml down -v
