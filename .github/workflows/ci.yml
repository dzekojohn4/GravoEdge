name: CI Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'gravoedge/web_app/**'
      - 'gravoedge/frontend/**'
      - 'devops/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gravoedge/web_app/**'
      - 'gravoedge/frontend/**'
      - 'devops/**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
        working-directory: ./gravoedge

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gravoedge
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: cp gravoedge/.env.dev .env

      - name: Start services and initialize database
        run: |
          docker compose -f devops/docker-compose.gravoedge.dev.yaml --env-file .env up -d --build 2>&1
          echo "=== Container status ==="
          docker compose -f devops/docker-compose.gravoedge.dev.yaml ps
          echo "=== Waiting for backend to be healthy ==="
          for i in $(seq 1 30); do
            if docker compose -f devops/docker-compose.gravoedge.dev.yaml exec -T backend curl -sf http://localhost:8000/health 2>/dev/null; then
              echo "Backend healthy after $((i * 2))s"
              break
            fi
            echo "Waiting... ($((i * 2))s)"
            sleep 2
          done
          echo "=== Backend logs ==="
          docker compose -f devops/docker-compose.gravoedge.dev.yaml logs backend --tail=30 || true
          echo "=== Running migrations ==="
          docker compose -f devops/docker-compose.gravoedge.dev.yaml exec -T backend poetry run alembic -c web_app/alembic.ini upgrade head


      - name: Run tests
        run: |
          docker compose -f devops/docker-compose.gravoedge.dev.yaml exec -T backend poetry run pytest web_app/tests

      - name: Run tests coverage
        run: |
          docker compose -f devops/docker-compose.gravoedge.dev.yaml exec -T backend poetry run pytest --cov=web_app --cov-report=term-missing

      - name: Tear down
        if: always()
        run: |
          docker compose -f devops/docker-compose.gravoedge.dev.yaml down
