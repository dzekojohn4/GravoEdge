name: Run Frontend Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'gravoedge/frontend/**'
      - 'devops/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gravoedge/frontend/**'
      - 'devops/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./gravoedge/frontend
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: gravoedge/frontend/yarn.lock

    - name: Create .env file
      run: cp .env.dev .env

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run tests
      run: yarn test:run

    - name: Run lint
      run: yarn lint

    - name: Build frontend
      run: yarn build

    - name: Generate bundle size report
      run: yarn bundle:size

    - name: Upload bundle size report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-bundle-size-report
        path: gravoedge/frontend/bundle-size-report.json
