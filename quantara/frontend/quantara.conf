server {
    listen 80;
    client_max_body_size 1M;

    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri /index.html;
    }

    # Optional: To handle static assets separately (if needed)
    location /static/ {
        root /usr/share/nginx/html;
    }
}
