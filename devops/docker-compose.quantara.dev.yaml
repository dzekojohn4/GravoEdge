version: "3.8"

networks:
  app_network:
    driver: bridge

services:
  backend:
    build: ../quantara
    command: ["/app/entrypoint.sh"]
    container_name: backend_dev
    volumes:
      - ../quantara/entrypoint.sh:/app/entrypoint.sh
      - ../quantara:/app
    env_file:
      - ../quantara/.env.dev
    ports:
      - "8000:8000"
    networks:
      - app_network
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=quantara
      - DB_USER=postgres
      - DB_PASSWORD=password

  db:
    image: postgres:16
    container_name: postgres_dev
    environment:
      POSTGRES_DB: quantara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ../quantara/init-db:/docker-entrypoint-initdb.d
    networks:
      - app_network
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../quantara/frontend
      dockerfile: Dockerfile.dev
    container_name: frontend_dev
    volumes:
      - ../quantara/frontend:/app
    ports:
      - "3000:80"
    networks:
      - app_network
    depends_on:
      - backend

volumes:
  postgres_data_dev:
