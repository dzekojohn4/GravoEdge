version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  backend:
    build: ../gravoedge
    command: bash /app/entrypoint.sh
    container_name: backend_dev
    restart: unless-stopped
    volumes:
      - ../gravoedge/entrypoint.sh:/app/entrypoint.sh
      - ../gravoedge:/app
    env_file:
      - ../gravoedge/.env.dev
    expose:
      - "8000"
    ports:
      - "8000:8000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=gravoedge
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16
    container_name: postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: gravoedge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ../gravoedge/init-db:/docker-entrypoint-initdb.d
    networks:
      - app_network
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev: